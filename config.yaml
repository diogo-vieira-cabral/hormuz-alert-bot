# ─────────────────────────────────────────────────────────────────────────────
# config.yaml — Hormuz Alert Bot
# ─────────────────────────────────────────────────────────────────────────────
# The only file you edit to change bot behaviour.
# Bot engine lives in main.py — no need to touch it.
#
# Source philosophy:
#   We use wire services only (Reuters, AP). Both are:
#     - Staffed 24/7 with regional correspondents
#     - Editorially disciplined: they don't publish until confirmed
#     - Fast: typically under 5 minutes from event to feed
#   General news aggregators (Google News, BBC, Al Jazeera) were removed
#   because they republish wire copy with a delay, adding latency and
#   duplicate alerts without adding signal.
#
# Keyword philosophy:
#   Keywords must imply CHANGE, not static situation.
#   "hormuz" matches "the strait remains closed" — useless.
# ─────────────────────────────────────────────────────────────────────────────

topic: "HORMUZ"

check_interval_minutes: 5


# ─────────────────────────────────────────────────────────────────────────────
# TIERS
# Evaluated in order — most severe first. First match wins.
# notify: false = logged silently, no Telegram ping.
# ─────────────────────────────────────────────────────────────────────────────

tiers:

  - label: "CRITICAL"
    emoji: "🚨"
    notify: true
    keywords:
      # Strait status — change words only
      - "strait opens"
      - "hormuz opens"
      - "passage restored"
      - "transit resumed"
      - "blockade lifted"
      - "strait closed"
      - "hormuz closed"
      # Military events — new incidents only
      - "missile strike"
      - "tanker seized"
      - "vessel seized"
      - "ship seized"
      - "tanker attacked"
      - "mine detected"
      - "mine laid"
      - "naval mine"
      - "ceasefire collapses"
      - "ceasefire violated"
      - "ceasefire ends"
      - "war resumes"

  - label: "HIGH IMPACT"
    emoji: "⚠️"
    notify: true
    keywords:
      # Diplomacy — active developments only
      - "ceasefire agreed"
      - "ceasefire announced"
      - "peace talks"
      - "deal reached"
      - "iran agrees"
      - "iran rejects"
      - "trump ultimatum"
      - "sanctions lifted"
      - "sanctions imposed"
      - "un resolution"
      # Market dislocation — not routine price moves
      - "crude surges"
      - "oil spikes"
      - "energy crisis"
      - "force majeure"
      - "shipping suspended"
      - "carrier suspends"

  - label: "UPDATE"
    emoji: "📡"
    notify: false
    keywords:
      - "hormuz"
      - "strait of hormuz"
      - "persian gulf"


# ─────────────────────────────────────────────────────────────────────────────
# FEEDS
# Wire services only. Both publish 24/7, both are fast and confirmed.
# ─────────────────────────────────────────────────────────────────────────────

feeds:
  # Reuters via Google News proxy — direct Reuters RSS died March 2026
  # allinurl: restricts results to reuters.com URLs only
  - https://news.google.com/rss/search?q=when:24h+allinurl:reuters.com&ceid=US:en&hl=en-US&gl=US

  # AP via Google News proxy — same approach, independent sourcing
  - https://news.google.com/rss/search?q=when:24h+allinurl:apnews.com&ceid=US:en&hl=en-US&gl=US